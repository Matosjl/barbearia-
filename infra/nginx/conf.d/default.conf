# ============================================================================
#  Reverse proxy (edge) — TLS + roteamento por NOME DE CONTAINER.
#  resolver 127.0.0.11 = DNS interno do Docker -> permite re-resolver quando
#  o backend escala (múltiplas réplicas). Nunca usamos IP fixo.
# ============================================================================

# DNS do Docker p/ resolução dinâmica das réplicas
resolver 127.0.0.11 valid=10s ipv6=off;

# Mapa para upgrade de WebSocket
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

# Redireciona HTTP -> HTTPS
server {
  listen 80;
  server_name _;
  # Desafio ACME (certbot/letsencrypt) — opcional
  location /.well-known/acme-challenge/ { root /var/www/certbot; }
  location / { return 301 https://$host$request_uri; }
}

server {
  listen 443 ssl;
  http2 on;
  server_name _;

  ssl_certificate     /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  client_max_body_size 25m;   # uploads de foto

  # ---- API REST ----
  location /api/ {
    set $upstream_backend backend:3000;
    proxy_pass http://$upstream_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ---- WebSocket (Socket.io) ----
  location /socket.io/ {
    set $upstream_ws backend:3000;
    proxy_pass http://$upstream_ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;   # conexões longas
  }

  # ---- Webhook da Evolution (entra pelo backend, não expõe a Evolution) ----
  location /webhooks/ {
    set $upstream_hooks backend:3000;
    proxy_pass http://$upstream_hooks;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # ---- Frontend (SPA) ----
  location / {
    set $upstream_front frontend:80;
    proxy_pass http://$upstream_front;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
