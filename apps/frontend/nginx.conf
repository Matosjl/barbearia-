# SPA: serve assets e faz fallback para index.html (rotas do React Router).
# Não trata TLS nem /api — isso é responsabilidade do proxy/edge.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # cache agressivo para assets versionados pelo Vite
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Service Worker do PWA não pode ser cacheado
  location = /sw.js { add_header Cache-Control "no-cache"; }
  location = /manifest.webmanifest { add_header Cache-Control "no-cache"; }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
